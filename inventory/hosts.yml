---
# =============================================================================
# Inventory
# -----------------------------------------------------------------------------
# Hosts are grouped by OS family. Group membership drives the per-family
# configuration layer (inventory/group_vars/<family>.yml); the host's own name
# drives the per-host layer (inventory/host_vars/<hostname>.yml).
#
# Add a new machine by dropping it under the matching family group and, if it
# needs deviations, creating inventory/host_vars/<hostname>.yml.
# =============================================================================
all:
  children:

    # Arch, CachyOS, Manjaro, EndeavourOS ... (ansible_os_family == Archlinux)
    archlinux:
      hosts:
        # This workstation. It runs Ansible against itself, hence connection
        # local. The inventory name matches the machine's live hostname; the
        # role pins /etc/hostname to it (see host_vars/petzko-lt-asus.yml).
        petzko-lt-asus:
          ansible_connection: local

    # Debian, Ubuntu, Pop!_OS, Mint ... (ansible_os_family == Debian)
    debian:
      hosts: {}
      # Example:
      #   ubuntu-web-01:
      #     ansible_host: 192.0.2.10
      #     ansible_user: ubuntu

    # Fedora, RHEL, Rocky, Alma ... (ansible_os_family == RedHat)
    redhat:
      hosts: {}
      # Example:
      #   fedora-ws-01:
      #     ansible_host: 192.0.2.20
      #     ansible_user: admin
