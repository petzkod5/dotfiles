[defaults]
# Default inventory used by every ansible/ansible-playbook invocation.
inventory = inventory/hosts.yml
roles_path = roles

# Readable YAML task results via the built-in default callback.
# (The old `stdout_callback = yaml` plugin was removed in community.general 12.)
callback_result_format = yaml
callbacks_enabled = ansible.posix.profile_tasks
nocows = True
deprecation_warnings = True
interpreter_python = auto_silent
gathering = smart
forks = 20

# Connection timeout (seconds). Also bounds how long Ansible waits for `become`
# (sudo) to return success. The 10s default is too tight on hosts where the
# first sudo is slow (e.g. a fresh VM whose hostname isn't yet in /etc/hosts).
timeout = 60

# Cache gathered facts so repeated runs are fast.
fact_caching = jsonfile
fact_caching_connection = .ansible_cache
fact_caching_timeout = 7200

# Keep the working tree clean.
retry_files_enabled = False

[privilege_escalation]
# Plays opt into privilege escalation explicitly via `become: true`.
become = False
become_method = sudo

[ssh_connection]
pipelining = True
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
