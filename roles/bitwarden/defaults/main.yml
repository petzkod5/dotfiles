---
# =============================================================================
# bitwarden role — pull SSH keys and files from your Bitwarden vault.
# Opt-in: via `dotfiles secrets`, or by listing `bitwarden` in a host's additional_roles.
# =============================================================================

# Package providing the `bw` CLI (Arch official repo; on Debian/Fedora install
# the npm package @bitwarden/cli instead).
bitwarden_cli_package: "bitwarden-cli"

# Vault server. Cloud default; use https://vault.bitwarden.eu for EU, or your
# self-hosted URL.
bitwarden_server: "https://vault.bitwarden.com"

# Where SSH material is written. bitwarden_home is resolved at runtime (in
# tasks/main.yml) to the home of the user the role runs as — never root.
bitwarden_ssh_dir: "{{ bitwarden_home }}/.ssh"

# Re-lock the vault when the run finishes.
bitwarden_lock_when_done: true

# SSH Key items to materialise. Each entry:
#   item: item name or id of a Bitwarden "SSH Key" item
#   dest: path for the private key (public key is written to dest + '.pub')
bitwarden_ssh_keys: []

# Files stored as item attachments to download. Each entry:
#   item:       item name or id holding the attachment
#   attachment: attachment filename as stored in Bitwarden
#   dest:       absolute path to write
#   mode:       file mode (default '0600')
bitwarden_files: []

# Secure notes whose body should be written to a file (e.g. a SOPS age key).
# Each entry:
#   item: item name or id of a Bitwarden "Secure note" (uses the note body)
#   dest: absolute path to write
#   mode: file mode (default '0600')
bitwarden_notes: []

# --- Environment-variable secure notes --------------------------------------
# A personal-vault stand-in for Bitwarden Secrets Manager. Every Secure Note in
# the `bitwarden_env_folder` becomes ONE exported environment variable: the note
# NAME is the variable name and the note BODY is its value. They are written to
# `bitwarden_env_file` (mode 0600, never committed) and exported into your shell
# by a loader dropped in ~/.config/zsh/rc.d/ (sourced by the zsh role's .zshrc).
# Note names must be valid shell identifiers ([A-Za-z_][A-Za-z0-9_]*); any other
# note in the folder is skipped. Set bitwarden_env_folder: "" to disable.
bitwarden_env_folder: "environment-variables"
bitwarden_env_file: "{{ bitwarden_home }}/.config/zsh/secrets.env"

# --- Credentials ------------------------------------------------------------
# bitwarden_client_id / bitwarden_client_secret: API key, only needed to LOG IN.
#   Skipped entirely when the CLI is already authenticated. Prompted when needed,
#   or pass via -e (see README). Low-sensitivity + revocable.
# bitwarden_master_password: prompted at runtime to unlock; NEVER store it.
